<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0a08">
  <title>PocketVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ───── AUTH SCREEN ───── -->
  <div id="auth-screen" style="display:none">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="7" fill="#1a1815"/>
          <rect x="8" y="11" width="16" height="13" rx="2" stroke="#e8a020" stroke-width="1.5" fill="none"/>
          <path d="M12 11V9a4 4 0 0 1 8 0v2" stroke="#e8a020" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="16" cy="17" r="1.5" fill="#e8a020"/>
          <line x1="16" y1="18.5" x2="16" y2="21" stroke="#e8a020" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Pocket<strong>Vault</strong></span>
      </div>
      <p class="auth-subtitle">Tus archivos, en todos tus dispositivos</p>

      <div id="auth-error" class="auth-error" style="display:none"></div>

      <div class="form-group">
        <label for="email-input">Correo electrónico</label>
        <input type="email" id="email-input" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password-input">Contraseña</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button id="signin-btn" class="btn btn-primary btn-full">Iniciar sesión</button>
      <button id="signup-btn" class="btn btn-ghost btn-full">Crear cuenta nueva</button>

      <div class="divider"><span>o continúa con</span></div>

      <button id="google-btn" class="btn btn-google btn-full">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.259c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71C3.784 10.17 3.682 9.593 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Entrar con Google
      </button>
    </div>
  </div>

  <!-- ───── APP SCREEN ───── -->
  <div id="app-screen" style="display:none">

    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="7" fill="#1a1815"/>
          <rect x="8" y="11" width="16" height="13" rx="2" stroke="#e8a020" stroke-width="1.5" fill="none"/>
          <path d="M12 11V9a4 4 0 0 1 8 0v2" stroke="#e8a020" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="16" cy="17" r="1.5" fill="#e8a020"/>
          <line x1="16" y1="18.5" x2="16" y2="21" stroke="#e8a020" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Pocket<strong>Vault</strong></span>
      </div>
      <div class="header-user">
        <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none">
        <div id="user-avatar-placeholder" class="user-avatar-placeholder"></div>
        <span id="user-name" class="user-name"></span>
        <button id="signout-btn" class="btn btn-icon" title="Cerrar sesión">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main">

      <!-- Upload zone -->
      <div id="drop-zone" class="drop-zone">
        <input type="file" id="file-input" multiple style="display:none">
        <div class="drop-zone-content">
          <div class="drop-icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="drop-text">Arrastra archivos aquí o <span class="drop-link">selecciona</span></p>
          <p class="drop-hint">Imágenes, documentos, vídeos… hasta 100 MB</p>
        </div>
      </div>

      <!-- Note input -->
      <div class="note-box">
        <textarea id="note-input" class="note-input" placeholder="Escribe un texto, enlace, contraseña… (Ctrl+Enter para enviar)" rows="1"></textarea>
        <button id="note-secret-toggle" class="note-secret-toggle" title="Guardar en sección oculta">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
        <button id="note-send" class="note-send" title="Enviar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <!-- Upload progress -->
      <div id="upload-progress-container" class="upload-progress-container"></div>

      <!-- Tabs -->
      <div class="tabs-wrapper">
        <div class="tabs" role="tablist">
          <button class="tab active" id="tab-all" data-tab="all" role="tab">Todos <span class="badge" id="badge-all"></span></button>
          <button class="tab" id="tab-favorites" data-tab="favorites" role="tab">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Favoritos <span class="badge" id="badge-favorites"></span>
          </button>
          <button class="tab" id="tab-images" data-tab="images" role="tab">Imágenes <span class="badge" id="badge-images"></span></button>
          <button class="tab" id="tab-documents" data-tab="documents" role="tab">Docs <span class="badge" id="badge-documents"></span></button>
          <button class="tab" id="tab-videos" data-tab="videos" role="tab">Vídeos <span class="badge" id="badge-videos"></span></button>
          <button class="tab" id="tab-notes" data-tab="notes" role="tab">Notas <span class="badge" id="badge-notes"></span></button>
          <button class="tab" id="tab-other" data-tab="other" role="tab">Otros <span class="badge" id="badge-other"></span></button>
          <button class="tab" id="tab-secret" data-tab="secret" role="tab">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Oculto <span class="badge" id="badge-secret"></span>
          </button>
        </div>
      </div>

      <!-- File grid -->
      <div id="file-grid" class="file-grid"></div>

    </main>

    <footer class="footer">
      <a href="https://madriddaniel.com" target="_blank" rel="noopener noreferrer" class="footer-link">
        hecho por <strong>Daniel Madrid</strong>
      </a>
    </footer>

  </div>

  <!-- Secret section password modal -->
  <div id="secret-modal" class="modal" style="display:none">
    <div class="modal-overlay"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2>Sección Oculta</h2>
        <button id="modal-close" class="btn btn-icon" title="Cerrar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-text">Introduce la contraseña para acceder</p>
        <input type="password" id="secret-password" class="secret-password-input" placeholder="Contraseña" autocomplete="off">
        <div id="secret-error" class="secret-error" style="display:none"></div>
      </div>
      <div class="modal-actions">
        <button id="secret-cancel" class="btn btn-ghost">Cancelar</button>
        <button id="secret-submit" class="btn btn-primary">Acceder</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="app.js"></script>

</body>
</html>
